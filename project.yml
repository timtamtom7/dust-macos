name: Dust
options:
  bundleIdPrefix: com.dust.app
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    ENABLE_HARDENED_RUNTIME: YES

targets:
  Dust:
    type: application
    platform: macOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dust.app.Dust
        INFOPLIST_FILE: Sources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/Dust.entitlements
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        STOREKit_FILE: "Sources/StoreKit.storekit"
    dependencies:
      - sdk: StoreKit.framework
      - target: DustWidgets
        embed: true

  DustWidgets:
    type: app-extension
    platform: macOS
    sources:
      - path: DustWidgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dust.app.Dust.DustWidgets
        PRODUCT_NAME: DustWidgets
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/../../../../Frameworks"
        SKIP_INSTALL: YES
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: YES
    info:
      path: DustWidgets/Info.plist
      properties:
        CFBundleName: DustWidgets
        CFBundleDisplayName: Dust Widgets
        CFBundleIdentifier: com.dust.app.Dust.DustWidgets
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        CFBundlePackageType: XPC!
        CFBundleExecutable: DustWidgets
        LSMinimumSystemVersion: "14.0"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: DustWidgets/DustWidgets.entitlements
